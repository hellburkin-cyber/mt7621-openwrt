name: Build OpenWrt

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build OpenWrt
        uses: openwrt/gh-action-sdk@main
        with:
          config: .config

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-firmware
          path: bin/targets/*/*
